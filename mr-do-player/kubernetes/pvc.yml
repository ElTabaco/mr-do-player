apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  namespace: mr-do-player
  name: mr-do-player-pvc-data
  labels:
    app.kubernetes.io/name: mr-do-player
    app.kubernetes.io/component: storage
spec:
  storageClassName: ""
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
  selector:
    matchLabels:
      usage: mr-do-player-pv-data
