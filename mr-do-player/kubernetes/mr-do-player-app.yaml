apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mr-do-player
  namespace: argocd
  labels:
    app.kubernetes.io/name: mr-do-player
    app.kubernetes.io/managed-by: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ElTabaco/mr-do-player.git
    targetRevision: main
    path: mr-do-player/kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: mr-do-player
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - PruneLast=true
      - PrunePropagationPolicy=foreground
    ignoreDifferences:
      # ArgoCD fights runtime-assigned fields on LoadBalancer Services
      - group: ""
        kind: Service
        name: mr-do-player-service
        jsonPointers:
          - /status
          - /spec/clusterIP
          - /spec/clusterIPs
          - /spec/externalTrafficPolicy
          - /spec/ipFamilyPolicy
          - /spec/ipFamilies
          - /spec/sessionAffinity
