apiVersion: v1
kind: Service
metadata:
  namespace: mr-do-player
  name: mr-do-player-service
spec:
  selector:
    app: mr-do-player
  # Stable LB IP for all services (MetalLB L2 ARP)
  type: LoadBalancer
  loadBalancerIP: 192.168.0.20
  # Preserve client source IP; only route to local pods (no cross-node hop)
  externalTrafficPolicy: Local
  ports:
    # --- UPnP / DLNA renderer ---
    - port: 49494
      targetPort: upnp-http
      protocol: TCP
      name: upnp-renderer
    - port: 1900
      targetPort: upnp-ssdp
      protocol: UDP
      name: upnp-ssdp
    # --- Snapcast ---
    - port: 1780
      targetPort: webinterface
      protocol: TCP
      name: webinterface
    - port: 1704
      targetPort: snapcast-stream
      protocol: TCP
      name: snapcast-stream
    - port: 1705
      targetPort: snapcast-control
      protocol: TCP
      name: snapcast-control
    # --- librespot (Spotify Connect) ---
    - port: 42661
      targetPort: librespot
      protocol: UDP
      name: librespot
    - port: 5353
      targetPort: mdns
      protocol: UDP
      name: mdns
