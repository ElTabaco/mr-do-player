apiVersion: v1
kind: Service
metadata:
  namespace: mr-do-player
  name: mr-do-player-service
spec:
  selector:
    app: mr-do-player
  type: ClusterIP
  ports:
    - port: 49494
      targetPort: upnp-http
      protocol: TCP
      name: upnp-renderer
    - port: 1900
      targetPort: upnp-ssdp
      protocol: UDP
      name: upnp-ssdp
    - port: 1780
      targetPort: webinterface
      protocol: TCP
      name: webinterface
    - port: 1704
      targetPort: snapcast-stream
      protocol: TCP
      name: snapcast-stream
    - port: 1705
      targetPort: snapcast-control
      protocol: TCP
      name: snapcast-control
    - port: 42661
      targetPort: librespot
      protocol: UDP
      name: librespot
    - port: 5353
      targetPort: mdns
      protocol: UDP
      name: mdns
