apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Apply with: kubectl apply -k .
# Or:        kubectl apply -f .  (kustomize direction argocd uses automatically)
resources:
  - application.yaml
  - configmap-asound.yaml
  - configmap-snapserver.yaml
  - deployment.yaml
  - persistentvolume.yaml
  - persistentvolumeclaim.yaml
  - poddisruptionbudget.yaml
  - service.yaml
