apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: mr-do-player
  name: mr-do-player
  labels:
    app: mr-do-player
spec:
  selector:
    matchLabels:
      app: mr-do-player
  replicas: 1
  template:
    metadata:
      labels:
        app: mr-do-player
    spec:
      nodeSelector:
        cputype: amd64
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      # Workaround for spotify
      hostAliases:
      - ip: "0.0.0.0"
        hostnames:
          - "apresolve.spotify.com"
      containers:
        - name: mr-do-upnp
          image: riemerk/mr-do-upnp:latest
          ports:
            - containerPort: 49494
              name: upnp-http
            - containerPort: 1900
              name: upnp-ssdp
              protocol: UDP
          env:
            - name: TZ
              value: Europe/Berlin
            - name: UPNP_NAME
              value: mrCast
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: mr-do-asound-cfgm
              mountPath: /etc/asound.conf
              subPath: asound.conf
              readOnly: true
            - name: mr-do-snapserver-data
              mountPath: /tmp/music
        - name: mr-do-snapserver
          image: riemerk/mr-do-snapserver:0.34.0
          ports:
            - containerPort: 1780
              name: webinterface
            - containerPort: 1704
              name: snapcast-stream
            - containerPort: 1705
              name: snapcast-control
            - containerPort: 42661
              name: librespot
              protocol: UDP
            - containerPort: 5353
              name: mdns
              protocol: UDP
          env:
            - name: TZ
              value: Europe/Berlin
          livenessProbe:
            tcpSocket:
              port: 1705
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 1780
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          volumeMounts:
            - name: mr-do-player-data
              mountPath: /root/.config/snapserver
              subPath: snapserver
            - name: mr-do-snapserver-cfgm
              mountPath: /etc/snapserver.conf
              subPath: snapserver.conf
              readOnly: true
            - name: mr-do-snapserver-data
              mountPath: /tmp/music
      volumes:
        - name: mr-do-snapserver-data
          emptyDir: {}
        - name: mr-do-player-data
          persistentVolumeClaim:
            claimName: mr-do-player-pvc-data
        - name: mr-do-asound-cfgm
          configMap:
            name: mr-do-asound-cfgmap
        - name: mr-do-snapserver-cfgm
          configMap:
            name: mr-do-snapserver-cfgmap
